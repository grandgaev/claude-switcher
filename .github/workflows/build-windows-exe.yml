name: Build Windows exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + build tools
        run: |
          pip install .
          pip install pyinstaller

      - name: Generate PyInstaller entry point
        shell: bash
        run: |
          cat > cli_entry.py <<'EOF'
          from claude_switcher.__main__ import main
          import sys
          sys.exit(main())
          EOF

      - name: Build claude-switcher.exe
        shell: bash
        run: |
          pyinstaller --onefile --name claude-switcher \
            --add-data "src/claude_switcher/app.tcss;claude_switcher" \
            cli_entry.py

      - name: Smoke-test the built exe (CLI paths only, no TUI)
        shell: bash
        run: |
          ./dist/claude-switcher.exe --help
          ./dist/claude-switcher.exe --lang en list

      - uses: actions/upload-artifact@v4
        with:
          name: claude-switcher-exe
          path: dist/claude-switcher.exe
